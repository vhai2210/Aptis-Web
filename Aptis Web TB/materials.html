<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OwlStudy - kho tài liệu Google Drive cho sinh viên HaUI.">
    <meta name="theme-color" content="#002B5C">
    <link rel="icon" href="assets/logo.png">
    <title>OwlStudy - Kho tài liệu</title>
    <style>
      :root {
        --blue: #005BAC;
        --blue-deep: #002B5C;
        --yellow: #F5C400;
        --white: #FFFFFF;
        --paper: #F4F7FB;
        --surface: #FFFFFF;
        --surface-soft: #F8FBFE;
        --text: #132237;
        --muted: #66768A;
        --line: rgba(0, 59, 122, 0.12);
        --shadow: 0 18px 46px rgba(0, 43, 92, 0.1);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -ms-user-select: none;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--paper);
        color: var(--text);
        font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      }

      input,
      select {
        user-select: text;
        -webkit-user-select: text;
        -ms-user-select: text;
      }

      img {
        -webkit-user-drag: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .container {
        width: min(1240px, calc(100% - 40px));
        margin: 0 auto;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(12px);
      }

      .topbar-inner {
        display: flex;
        min-height: 78px;
        align-items: center;
        justify-content: space-between;
        gap: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand img {
        width: 56px;
        height: 56px;
        object-fit: contain;
      }

      .brand strong {
        display: block;
        color: var(--blue-deep);
        font-size: 23px;
        line-height: 1;
      }

      .brand span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: var(--blue);
        color: var(--white);
        padding: 10px 15px;
        font-weight: 800;
      }

      .btn-yellow {
        background: var(--yellow);
        color: var(--blue-deep);
      }

      .btn-light {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--blue-deep);
      }

      .page {
        padding: 30px 0 54px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        background:
          linear-gradient(100deg, rgba(0, 43, 92, 0.95), rgba(0, 91, 172, 0.76)),
          url("assets/nenlogin.png") center / cover no-repeat;
        color: var(--white);
        padding: 30px;
        box-shadow: var(--shadow);
      }

      .hero::before {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(142, 208, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(142, 208, 255, 0.06) 1px, transparent 1px);
        background-size: 36px 36px;
        content: "";
        opacity: 0.5;
      }

      .hero > * {
        position: relative;
        z-index: 1;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.16;
      }

      .hero p {
        max-width: 780px;
        margin: 0;
        color: rgba(255, 255, 255, 0.84);
        line-height: 1.65;
      }

      .tools {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 210px 210px;
        gap: 12px;
        margin: 22px 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 16px;
        box-shadow: var(--shadow);
      }

      input,
      select {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: var(--surface-soft);
        color: var(--text);
        padding: 0 13px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(0, 91, 172, 0.12);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }

      .card {
        position: relative;
        display: flex;
        min-height: 248px;
        flex-direction: column;
        justify-content: space-between;
        gap: 16px;
        overflow: hidden;
        border: 1px solid rgba(0, 91, 172, 0.28);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 18px;
        box-shadow: var(--shadow);
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .card:hover {
        transform: translateY(-4px);
        border-color: rgba(0, 91, 172, 0.44);
        box-shadow: 0 24px 54px rgba(0, 43, 92, 0.14), 0 0 0 3px rgba(0, 91, 172, 0.08);
      }

      .doc-preview {
        height: 78px;
        border: 1px solid rgba(0, 91, 172, 0.22);
        border-radius: 14px;
        background:
          linear-gradient(135deg, rgba(0, 91, 172, 0.28), rgba(245, 196, 0, 0.2)),
          #F4F8FD;
        box-shadow: inset 0 0 0 1px rgba(0, 91, 172, 0.08);
        overflow: hidden;
      }

      .doc-preview.has-thumb {
        height: 118px;
        border-color: rgba(0, 91, 172, 0.3);
        background: #FFFFFF;
      }

      .doc-preview.has-thumb img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
      }

      .badge {
        display: inline-flex;
        width: fit-content;
        border-radius: 999px;
        background: #EAF3FB;
        color: var(--blue);
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 800;
      }

      .card h2 {
        margin: 12px 0 8px;
        color: var(--blue-deep);
        font-size: 19px;
        line-height: 1.28;
      }

      .meta {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .empty {
        grid-column: 1 / -1;
        border: 1px dashed rgba(0, 91, 172, 0.24);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 24px;
        color: var(--muted);
        font-weight: 700;
      }

      .pagination {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }

      .page-number {
        display: grid;
        min-width: 40px;
        height: 40px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        color: var(--blue-deep);
        font-weight: 900;
      }

      .page-number.is-active {
        border-color: var(--yellow);
        background: var(--yellow);
      }

      @media (max-width: 1050px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .tools {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 680px) {
        .container {
          width: min(100% - 28px, 1240px);
        }

        .topbar-inner {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 0;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="student.html#materials">
          <img src="assets/logo.png" alt="OwlStudy">
          <span>
            <strong>OwlStudy</strong>
            <span>Tài liệu cho sinh viên HaUI</span>
          </span>
        </a>
        <nav class="nav">
          <a class="btn btn-light" href="student.html#materials">Về dashboard</a>
          <a class="btn btn-yellow" href="practice.html">Phòng luyện</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <div class="container">
        <section class="hero">
          <h1>Kho tài liệu</h1>
        </section>

        <section class="tools" aria-label="Bộ lọc tài liệu">
          <input id="searchInput" type="search" placeholder="Tìm tài liệu">
          <select id="subjectFilter"></select>
          <select id="typeFilter"></select>
        </section>

        <section class="grid" id="materialsGrid" aria-label="Danh sách tài liệu"></section>
        <div class="pagination" id="pageNumbers" aria-label="Phân trang tài liệu"></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="data-service.js"></script>

    <script>
      const pageSize = 12;
      let page = 1;
      let searchTimer;
      let keyword = "";

      function readJson(key, fallback) {
        return fallback;
      }

      let subjects = readJson("subjects", []);
      const subjectMap = new Map(subjects.map((s) => [s.id, s.name || s.title]).filter((item) => item[0] && item[1]));
      let materials = readJson("materials", []).map((item, index) => ({
        id: item.id || index + 1,
        title: item.title || item.name || "Tài liệu OwlStudy",
        subjectId: item.subjectId || "",
        subject: item.subject || subjectMap.get(item.subjectId) || "Chưa phân loại",
        type: item.type || "Tài liệu",
        uploader: item.uploader || item.teacher || "Giáo viên",
        date: item.date || item.createdAt || new Date().toLocaleDateString("vi-VN"),
        link: item.driveUrl || item.link || item.url || "#",
        status: item.status || "public"
      })).filter((item) => item.status === "public" || item.status === "Sẵn sàng");

      async function loadMaterialsData() {
        try {
          const [subjectRows, materialRows] = await Promise.all([
            window.OwlStudyData.getSubjects({ status: "active" }),
            window.OwlStudyData.getMaterials({ status: "public" })
          ]);
          const activeSubjectIds = new Set(subjectRows.map((subject) => subject.id));
          subjects = subjectRows;
          materials = materialRows.filter((item) => activeSubjectIds.has(item.subjectId));
          initFilters();
          renderMaterials();
        } catch (error) {
          console.error(error);
          document.getElementById("materialsGrid").innerHTML = `<div class="empty">Khong the tai tai lieu tu Supabase.</div>`;
        }
      }

      function initFilters() {
        const subjectList = ["all", ...new Set(materials.map((item) => item.subject))];
        const typeList = ["all", ...new Set(materials.map((item) => item.type))];
        document.getElementById("subjectFilter").innerHTML = subjectList.map((item) => `<option value="${item}">${item === "all" ? "Tất cả môn" : item}</option>`).join("");
        document.getElementById("typeFilter").innerHTML = typeList.map((item) => `<option value="${item}">${item === "all" ? "Tất cả loại tài liệu" : item}</option>`).join("");
      }

      function filteredMaterials() {
        const subject = document.getElementById("subjectFilter").value;
        const type = document.getElementById("typeFilter").value;
        const q = keyword.toLowerCase();
        return materials.filter((item) => {
          const matchKeyword = !q || [item.title, item.subject, item.type, item.uploader].join(" ").toLowerCase().includes(q);
          const matchSubject = subject === "all" || item.subject === subject;
          const matchType = type === "all" || item.type === type;
          return matchKeyword && matchSubject && matchType;
        });
      }

      function driveFileId(url) {
        if (!url || url === "#") return "";
        const fileMatch = String(url).match(/\/file\/d\/([^/]+)/);
        if (fileMatch && fileMatch[1]) return fileMatch[1];
        const idMatch = String(url).match(/[?&]id=([^&]+)/);
        return idMatch && idMatch[1] ? idMatch[1] : "";
      }

      function driveThumbnailUrl(url) {
        const id = driveFileId(url);
        return id ? "https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w600" : "";
      }

      function docPreview(item) {
        const thumbnail = driveThumbnailUrl(item.link);
        if (!thumbnail) return `<div class="doc-preview" aria-hidden="true"></div>`;
        return `<div class="doc-preview has-thumb"><img src="${thumbnail}" alt="" loading="lazy" onerror="this.parentElement.classList.remove('has-thumb'); this.remove();"></div>`;
      }

      function renderMaterials() {
        const grid = document.getElementById("materialsGrid");
        const filtered = filteredMaterials();
        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        page = Math.min(page, totalPages);
        const pageItems = filtered.slice((page - 1) * pageSize, page * pageSize);

        if (!pageItems.length) {
          grid.innerHTML = `<div class="empty">Không tìm thấy tài liệu phù hợp. Thử đổi từ khóa hoặc bộ lọc.</div>`;
          document.getElementById("pageNumbers").innerHTML = "";
          return;
        }

        grid.innerHTML = pageItems.map((item) => `
          <article class="card">
            <div>
              ${docPreview(item)}
              <span class="badge">${item.subject}</span>
              <h2>${item.title}</h2>
              <div class="meta">
                <span>Loại: ${item.type}</span>
                <span>Người đăng: ${item.uploader}</span>
                <span>Ngày đăng: ${item.date}</span>
              </div>
            </div>
            <a class="btn btn-yellow" href="material-viewer.html?id=${encodeURIComponent(item.id)}">Xem tài liệu</a>
          </article>
        `).join("");
        document.getElementById("pageNumbers").innerHTML = Array.from({ length: totalPages }, (_, index) => {
          const number = index + 1;
          return `<button class="page-number ${number === page ? "is-active" : ""}" type="button" data-page="${number}">${number}</button>`;
        }).join("");
      }

      document.getElementById("searchInput").addEventListener("input", (event) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          keyword = event.target.value;
          page = 1;
          renderMaterials();
        }, 300);
      });
      document.getElementById("subjectFilter").addEventListener("change", () => { page = 1; renderMaterials(); });
      document.getElementById("typeFilter").addEventListener("change", () => { page = 1; renderMaterials(); });
      document.getElementById("pageNumbers").addEventListener("click", (event) => {
        const button = event.target.closest("[data-page]");
        if (!button) return;
        page = Number(button.dataset.page) || 1;
        renderMaterials();
      });

      loadMaterialsData();
    </script>
  </body>
</html>
